<!DOCTYPE html>
<html>
<head>
    <title>Furniture Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #248bed);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        .item {
            width: 45%;
            background-color: var(--sec-bg);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .img { width: 100%; border-radius: 8px; }
        
        #user-name { color: var(--hint); margin: 20px 0; font-size: 14px; }

        .stepper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-step {
            background-color: var(--btn);
            color: var(--btn-text);
            border: none;
            border-radius: 50%; /* Сделаем кнопки круглыми для красоты */
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .count-display { font-weight: bold; min-width: 20px; }
    </style>
</head>
<body>

    <p id="user-name">Загрузка...</p>

    <div class="container">
        <div class="item">
            <img src="https://via.placeholder.com/150" alt="Диван" class="img">
            <p>Стильный диван</p>
            <p><b>25000 руб.</b></p>
            
            <div class="stepper">
                <button class="btn-step" id="sofa-minus">-</button>
                <span class="count-display" id="sofa-count">0</span>
                <button class="btn-step" id="sofa-plus">+</button>
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Элементы
    const nameElement = document.getElementById('user-name');
    const countElement = document.getElementById('sofa-count');
    const btnPlus = document.getElementById('sofa-plus');
    const btnMinus = document.getElementById('sofa-minus');

    let itemCount = 0;

    // 1. Приветствие
    const user = tg.initDataUnsafe?.user;
    nameElement.innerText = user ? `Привет, ${user.first_name}!` : "Данные не найдены";

    // 2. Обновление интерфейса
    function render() {
        // Обновляем цифру на странице
        countElement.innerText = itemCount;

        // Обновляем Главную кнопку Telegram
        if (itemCount > 0) {
            tg.MainButton.setText(`Перейти в корзину (${itemCount})`);
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
    }

    // 3. Логика кнопок
    btnPlus.addEventListener('click', () => {
        itemCount++;
        tg.HapticFeedback.impactOccurred('light');
        render();
    });

    btnMinus.addEventListener('click', () => {
        if (itemCount > 0) {
            itemCount--;
            tg.HapticFeedback.impactOccurred('light');
            render();
        }
    });

    // 4. Обработка системных кнопок
    tg.MainButton.onClick(() => {
        tg.showAlert(`Вы оформили заказ на ${itemCount} тов.`);
    });

    tg.onEvent('themeChanged', () => render());

</script>
</body>
</html>
