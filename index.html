<!DOCTYPE html>
<html>
<head>
    <title>My First TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
    body {
        /* Используем системные цвета Telegram */
        background-color: var(--tg-theme-bg-color);
        color: var(--tg-theme-text-color);
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }

    button {
        /* Кнопка тоже будет подстраиваться под тему */
        background-color: var(--tg-theme-button-color);
        color: var(--tg-theme-button-text-color);
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        cursor: pointer;
    }
</style>
</head>
<body>
    <p id="user-name">Ожидание данных...</p>
    <button id="main-action">Нажми меня!</button>

<script>
    // 1. Инициализация (делаем один раз в самом начале)
    const tg = window.Telegram.WebApp;
    tg.expand(); 

    // 2. Настройка Главной кнопки
    tg.MainButton.text = "Подтвердить заказ";
    tg.MainButton.show();

    // 3. Логика для кнопок
    // Для системной кнопки Telegram
    tg.MainButton.onClick(() => {
        tg.showAlert("Вы нажали на системную кнопку!");
    });

    // Для твоей кнопки в HTML (Нажми меня!)
    const btn = document.getElementById('main-action');
    btn.addEventListener('click', () => {
        tg.HapticFeedback.impactOccurred('medium'); 
        tg.showAlert("Кнопка нажата! Сейчас приложение закроется.");
        setTimeout(() => { tg.close(); }, 2000);
    });

   // 4. Работа с данными пользователя
const user = tg.initDataUnsafe?.user;
const nameElement = document.getElementById('user-name');

if (user) {
    // Если данные есть, пишем имя
    nameElement.innerText = `Привет, ${user.first_name}!`;
} else {
    // Если данных нет (например, на ПК), пишем причину
    nameElement.innerText = "Данные пользователя не найдены (возможно, вы на ПК)";
}
    tg.onEvent('themeChanged', function() {
    tg.showAlert("Цветовая тема изменилась!");
    // Здесь можно вручную обновить какие-то элементы, 
    // если переменные var(--tg-theme-...) не справились сами
});
    // Показываем кнопку "Назад" в верхнем меню Telegram
tg.BackButton.show();

// Настраиваем действие при нажатии на неё
tg.BackButton.onClick(() => {
    tg.showAlert("Вы нажали кнопку 'Назад'. Здесь мы могли бы вернуть пользователя в каталог.");
});
</script>
</body>
</html>
