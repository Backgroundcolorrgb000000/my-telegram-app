<!DOCTYPE html>
<html>
<head>
    <title>My First TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
    body {
        /* Используем системные цвета Telegram */
        background-color: var(--tg-theme-bg-color);
        color: var(--tg-theme-text-color);
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }

    button {
        /* Кнопка тоже будет подстраиваться под тему */
        background-color: var(--tg-theme-button-color);
        color: var(--tg-theme-button-text-color);
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        cursor: pointer;
    }
        .container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    padding: 10px;
}

.item {
    width: 45%;
    background-color: var(--tg-theme-secondary-bg-color);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 15px;
    text-align: center;
    color: var(--tg-theme-text-color);
}

.img {
    width: 100%;
    border-radius: 8px;
}

.btn-add {
    background-color: var(--tg-theme-button-color);
    color: var(--tg-theme-button-text-color);
    border: none;
    border-radius: 5px;
    padding: 5px 10px;
    cursor: pointer;
}
</style>
</head>
<body>
    <div id="item-list" class="container">
    <div class="item">
        <img src="https://via.placeholder.com/150" alt="Диван" class="img">
        <p>Стильный диван</p>
        <p><b>25000 руб.</b></p>
        <button class="btn-add" id="buy-sofa">Выбрать</button>
    </div>
    </div>
    <p id="user-name">Ожидание данных...</p>
    <button id="main-action">Нажми меня!</button>

<script>
    // 1. Инициализация (делаем один раз в самом начале)
   const tg = window.Telegram.WebApp;
// Сначала находим кнопку в HTML и сохраняем её в переменную btn
const btn = document.getElementById('main-action'); 

tg.expand();
// Прячем кнопку назад при старте, чтобы она не маячила зря
tg.BackButton.hide();
    // 2. Настройка Главной кнопки
    tg.MainButton.text = "Подтвердить заказ";
    tg.MainButton.show();

   // 4. Работа с данными пользователя
const user = tg.initDataUnsafe?.user;
const nameElement = document.getElementById('user-name');

if (user) {
    // Если данные есть, пишем имя
    nameElement.innerText = `Привет, ${user.first_name}!`;
} else {
    // Если данных нет (например, на ПК), пишем причину
    nameElement.innerText = "Данные пользователя не найдены (возможно, вы на ПК)";
}
    tg.onEvent('themeChanged', function() {
    tg.showAlert("Цветовая тема изменилась!");
    // Здесь можно вручную обновить какие-то элементы, 
    // если переменные var(--tg-theme-...) не справились сами
});
    // Показываем кнопку "Назад" в верхнем меню Telegram
tg.BackButton.show();

// Настраиваем действие при нажатии на неё
tg.BackButton.onClick(() => {
    tg.showAlert("Вы нажали кнопку 'Назад'. Здесь мы могли бы вернуть пользователя в каталог.");
});
    btn.addEventListener('click', () => {
    // Скрываем текст приветствия, как будто перешли на новую страницу
    document.getElementById('user-name').innerText = "Вы перешли в каталог мебели! 🛋️";
    
    // Показываем кнопку "Назад"
    tg.BackButton.show();
});

// А теперь настроим саму кнопку "Назад"
tg.BackButton.onClick(() => {
    // Возвращаем текст
    document.getElementById('user-name').innerText = `С возвращением, ${tg.initDataUnsafe?.user?.first_name}!`;
    
    // Прячем кнопку "Назад", так как мы снова на главной
    tg.BackButton.hide();
});
    // Находим кнопку дивана
const sofaBtn = document.getElementById('buy-sofa');

let itemCount = 0;

// Создаем одну общую функцию для обновления кнопки
function updateMainButton() {
    if (itemCount > 0) {
        tg.MainButton.setText(`Перейти в корзину (${itemCount})`);
        tg.MainButton.show();
    } else {
        tg.MainButton.hide();
    }
}

// Теперь у кнопки только один обработчик
sofaBtn.addEventListener('click', () => {
    itemCount++; 
    tg.HapticFeedback.impactOccurred('light');
    updateMainButton(); // Вызываем нашу функцию
});
    
    // 2. Показываем кнопку, если она была скрыта
    if (!tg.MainButton.isVisible) {
        tg.MainButton.show();
    }

    // 3. Добавим легкую вибрацию для клика
    tg.HapticFeedback.impactOccurred('light');
});
    
</script>
</body>
</html>
