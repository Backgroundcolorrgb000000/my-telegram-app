<!DOCTYPE html>
<html>
<head>
    <title>My First TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
    body {
        /* Используем системные цвета Telegram */
        background-color: var(--tg-theme-bg-color);
        color: var(--tg-theme-text-color);
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }

    button {
        /* Кнопка тоже будет подстраиваться под тему */
        background-color: var(--tg-theme-button-color);
        color: var(--tg-theme-button-text-color);
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        cursor: pointer;
    }
</style>
</head>
<body>
    <button id="main-action">Нажми меня!</button>

<script>
    const tg = window.Telegram.WebApp;
    const btn = document.getElementById('main-action');

    btn.addEventListener('click', () => {
        tg.HapticFeedback.impactOccurred('medium'); // Вибрация
        tg.showAlert("Кнопка нажата! Сейчас приложение закроется.");
        setTimeout(() => {
            tg.close(); // Закрыть Mini App
        }, 2000);
    });
</script>
<script>
    // Показываем главную кнопку
tg.MainButton.text = "Подтвердить заказ"; // Текст на кнопке
tg.MainButton.show(); // Делаем её видимой

// Вешаем событие на нажатие
tg.MainButton.onClick(() => {
    tg.showAlert("Вы нажали на системную кнопку!");
});
</script>
    <h1>Привет, Telegram!</h1>
    <p id="user-name">Загрузка...</p>

    <script>
        // Инициализация приложения
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачивает окно на всю высоту

        // Пробуем достать имя пользователя
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = `Привет, ${user.first_name}!`;
        }
    </script>
</body>
</html>
