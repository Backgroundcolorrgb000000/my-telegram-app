<!DOCTYPE html>
<html>
<head>
    <title>Furniture Store TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 10px;
            width: 100%;
        }

        .item {
            width: 45%;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        .img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .stepper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-step {
            background-color: var(--tg-theme-button-color, #248bed);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 6px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .count-display {
            font-weight: bold;
            min-width: 15px;
        }

        #user-name {
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <p id="user-name">Загрузка...</p>
    <div id="item-list" class="container"></div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// Элементы интерфейса
const nameElement = document.getElementById('user-name');
const itemList = document.getElementById('item-list');

// 1. Данные о товарах
const products = [
    { id: 'sofa', name: 'Стильный диван', price: 25000, img: 'https://via.placeholder.com/150' },
    { id: 'chair', name: 'Мягкое кресло', price: 15000, img: 'https://via.placeholder.com/150' },
    { id: 'table', name: 'Обеденный стол', price: 10000, img: 'https://via.placeholder.com/150' }
];

// Состояние корзины
let cart = {};
let finalPriceWithDiscount = 0;

// 2. Приветствие пользователя
const user = tg.initDataUnsafe?.user;
nameElement.innerText = user ? `Привет, ${user.first_name}!` : "Привет, Гость!";

// 3. Функция изменения количества товара
function changeCount(productId, delta) {
    if (!cart[productId]) cart[productId] = 0;
    
    cart[productId] += delta;
    
    if (cart[productId] < 0) cart[productId] = 0;

    // Легкая вибрация при нажатии
    tg.HapticFeedback.impactOccurred('light');
    
    renderProducts();
    updateCartTotal();
}

// 4. Отрисовка списка товаров
function renderProducts() {
    itemList.innerHTML = '';
    products.forEach(product => {
        const count = cart[product.id] || 0;
        const itemDiv = document.createElement('div');
        itemDiv.className = 'item';
        itemDiv.innerHTML = `
            <img src="${product.img}" class="img">
            <p>${product.name}</p>
            <p><b>${product.price} руб.</b></p>
            <div class="stepper">
                <button class="btn-step" onclick="changeCount('${product.id}', -1)">-</button>
                <span class="count-display">${count}</span>
                <button class="btn-step" onclick="changeCount('${product.id}', 1)">+</button>
            </div>`;
        itemList.appendChild(itemDiv);
    });
}

// 5. Функция подсчета итога и управления MainButton
function updateCartTotal() {
    let totalPrice = 0;
    let totalCount = 0;

    for (let id in cart) {
        const product = products.find(p => p.id === id);
        if (product && cart[id] > 0) {
            totalPrice += product.price * cart[id];
            totalCount += cart[id];
        }
    }

    // Применяем скидку 10%
    finalPriceWithDiscount = totalPrice * 0.9;

    if (totalCount > 0) {
        tg.MainButton.setText(`Оформить заказ: ${finalPriceWithDiscount} руб.`);
        tg.MainButton.show();
    } else {
        tg.MainButton.hide();
    }
}

// 6. Обработка нажатия на главную кнопку (Отправка данных)
// Обработка нажатия на главную кнопку
tg.MainButton.onClick(() => {
    tg.showConfirm("Вы уверены, что хотите оформить заказ?", (isConfirmed) => {
        if (isConfirmed) {
            // ПРОВЕРКА: Есть ли что-то в корзине?
            if (Object.keys(cart).length === 0) {
                tg.showAlert("Ваша корзина пуста!");
                return;
            }

            const orderData = {
                products: cart,
                totalPrice: finalPriceWithDiscount // Используем реальную цену со скидкой
            };

            const dataToSend = JSON.stringify(orderData);
            tg.sendData(dataToSend); 
        }
    });
});

// Инициализация при запуске
renderProducts();
updateCartTotal();
</script>
</body>
</html>
