<!DOCTYPE html>
<html>
<head>
    <title>Furniture Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #248bed);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        .item {
            width: 45%;
            background-color: var(--sec-bg);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .img { width: 100%; border-radius: 8px; }
        
        #user-name { color: var(--hint); margin: 20px 0; font-size: 14px; }

        .stepper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 10px;
        }

        .btn-step {
            background-color: var(--btn);
            color: var(--btn-text);
            border: none;
            border-radius: 50%; /* Сделаем кнопки круглыми для красоты */
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .count-display { font-weight: bold; min-width: 20px; }
    </style>
</head>
<body>

    <p id="user-name">Загрузка...</p>

    <div class="container">
        <div class="item">
            <div class="stepper">
            </div>
        </div>
    </div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // Элементы
    const nameElement = document.getElementById('user-name');
    const countElement = document.getElementById('sofa-count');
    const btnPlus = document.getElementById('sofa-plus');
    const btnMinus = document.getElementById('sofa-minus');

    let itemCount = 0;
    
    const products = [
    { id: 'sofa', name: 'Стильный диван', price: 25000, img: 'https://via.placeholder.com/150' },
    { id: 'chair', name: 'Мягкое кресло', price: 15000, img: 'https://via.placeholder.com/150' },
    { id: 'table', name: 'Обеденный стол', price: 10000, img: 'https://via.placeholder.com/150' }
];

// Здесь мы будем хранить количество выбранных товаров
// Например: { 'sofa': 2, 'chair': 1 }
let cart = {};





function changeCount(productId, delta) {
    // 1. Инициализируем товар в корзине, если его там еще нет
    if (!cart[productId]) {
        cart[productId] = 0;
    }

    // 2. Изменяем количество
    cart[productId] += delta;

    // 3. Проверка: нельзя купить меньше 0 товаров
    if (cart[productId] < 0) {
        cart[productId] = 0;
    }

    // 4. После изменения данных нужно перерисовать экран
    renderProducts();
    
    // 5. И обновить главную кнопку Telegram
    updateCartTotal();
    
    tg.HapticFeedback.impactOccurred('light');
}

    

    

    const itemList = document.getElementById('item-list');

function renderProducts() {
    itemList.innerHTML = ''; // Очищаем список перед отрисовкой

    products.forEach(product => {
        // Создаем карточку товара
        const itemDiv = document.createElement('div');
        itemDiv.classList.add('item');

        // Получаем текущее количество этого товара в корзине (или 0)
        const count = cart[product.id] || 0;

        // Наполняем карточку содержимым
        itemDiv.innerHTML = `
            <img src="${product.img}" alt="${product.name}" class="img">
            <p>${product.name}</p>
            <p><b>${product.price} руб.</b></p>
            <div class="stepper">
                <button class="btn-step" onclick="changeCount('${product.id}', -1)">-</button>
                <span class="count-display">${count}</span>
                <button class="btn-step" onclick="changeCount('${product.id}', 1)">+</button>
            </div>
        `;
        
        itemList.appendChild(itemDiv);
    });
}

    

    // 1. Приветствие
    const user = tg.initDataUnsafe?.user;
    nameElement.innerText = user ? `Привет, ${user.first_name}!` : "Данные не найдены";

    // 2. Обновление интерфейса
    function render() {
        // Обновляем цифру на странице
        countElement.innerText = itemCount;

        // Обновляем Главную кнопку Telegram
        if (itemCount > 0) {
            tg.MainButton.setText(`Перейти в корзину (${itemCount})`);
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
    }

    // 3. Логика кнопок
    btnPlus.addEventListener('click', () => {
        itemCount++;
        tg.HapticFeedback.impactOccurred('light');
        render();
    });

    btnMinus.addEventListener('click', () => {
        if (itemCount > 0) {
            itemCount--;
            tg.HapticFeedback.impactOccurred('light');
            render();
        }
    });

    // 4. Обработка системных кнопок
    tg.MainButton.onClick(() => {
        tg.showAlert(`Вы оформили заказ на ${itemCount} тов.`);
    });

    tg.onEvent('themeChanged', () => render());

</script>
</body>
</html>
