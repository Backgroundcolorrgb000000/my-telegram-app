<!DOCTYPE html>
<html>
<head>
    <title>Furniture Store TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 10px;
            width: 100%;
        }

        .item {
            width: 45%;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        .img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .stepper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-step {
            background-color: var(--tg-theme-button-color, #248bed);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 6px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .count-display {
            font-weight: bold;
            min-width: 15px;
        }

        #user-name {
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <p id="user-name">Загрузка...</p>
    <div id="item-list" class="container"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const nameElement = document.getElementById('user-name');
    const itemList = document.getElementById('item-list');

    // 1. Наш каталог товаров
    const products = [
        { id: 'sofa', name: 'Стильный диван', price: 25000, img: 'https://via.placeholder.com/150' },
        { id: 'chair', name: 'Мягкое кресло', price: 15000, img: 'https://via.placeholder.com/150' },
        { id: 'table', name: 'Обеденный стол', price: 10000, img: 'https://via.placeholder.com/150' }
    ];

    // 2. Объект корзины (хранит id_товара: количество)
    let cart = {};

    // Данные пользователя
    const user = tg.initDataUnsafe?.user;
    nameElement.innerText = user ? `Привет, ${user.first_name}!` : "Привет, Гость!";

    // 3. Функция для изменения количества
    function changeCount(productId, delta) {
        if (!cart[productId]) cart[productId] = 0;
        
        cart[productId] += delta;

        if (cart[productId] < 0) cart[productId] = 0;

        tg.HapticFeedback.impactOccurred('light');
        renderProducts();
        updateCartTotal();
    }

    // 4. Функция отрисовки товаров
    function renderProducts() {
        itemList.innerHTML = '';

        products.forEach(product => {
            const count = cart[product.id] || 0;
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item';
            itemDiv.innerHTML = `
                <img src="${product.img}" class="img">
                <p style="margin: 5px 0;">${product.name}</p>
                <p><b>${product.price} сумм.</b></p>
                <div class="stepper">
                    <button class="btn-step" onclick="changeCount('${product.id}', -1)">-</button>
                    <span class="count-display">${count}</span>
                    <button class="btn-step" onclick="changeCount('${product.id}', 1)">+</button>
                </div>
            `;
            itemList.appendChild(itemDiv);
        });
    }

    // 5. Функция подсчета итога для MainButton
    function updateCartTotal() {
        let totalPrice = 0;
        let totalCount = 0;

        for (let id in cart) {
            const product = products.find(p => p.id === id);
            if (product) {
                totalPrice += product.price * cart[id];
                totalCount += cart[id];
            }
        }

        if (totalCount > 0) {
            tg.MainButton.setText(`Оформить заказ: ${totalPrice} руб.`);
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
    }

    // Обработка нажатия на главную кнопку
    tg.MainButton.onClick(() => {
        tg.showAlert("Заказ отправлен в обработку!");
    });

    // Запуск приложения
    renderProducts();
    updateCartTotal();

</script>
</body>
</html>
