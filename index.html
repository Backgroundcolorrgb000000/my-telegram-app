<!DOCTYPE html>
<html>
<head>
    <title>Furniture Store TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #fff);
            color: var(--tg-theme-text-color, #000);
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 10px;
            width: 100%;
        }

        .item {
            width: 45%;
            background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
            box-sizing: border-box;
        }

        .img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 5px;
        }

        .stepper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-step {
            background-color: var(--tg-theme-button-color, #248bed);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 6px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-weight: bold;
        }

        .count-display {
            font-weight: bold;
            min-width: 15px;
        }

        #user-name {
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <p id="user-name">Загрузка...</p>
    <div id="item-list" class="container"></div>

<script>
    const tg = window.Telegram.WebApp;
tg.expand();

const nameElement = document.getElementById('user-name');
const itemList = document.getElementById('item-list');

// 1. Каталог и состояние
const products = [
    { id: 'sofa', name: 'Стильный диван', price: 25000, img: 'https://via.placeholder.com/150' },
    { id: 'chair', name: 'Мягкое кресло', price: 15000, img: 'https://via.placeholder.com/150' },
    { id: 'table', name: 'Обеденный стол', price: 10000, img: 'https://via.placeholder.com/150' }
];

let cart = {};
let finalPriceWithDiscount = 0;

// 2. Приветствие
const user = tg.initDataUnsafe?.user;
nameElement.innerText = user ? `Привет, ${user.first_name}!` : "Привет, Гость!";

// 3. Логика корзины
function changeCount(productId, delta) {
    if (!cart[productId]) cart[productId] = 0;
    cart[productId] += delta;
    if (cart[productId] < 0) cart[productId] = 0;

    tg.HapticFeedback.impactOccurred('light');
    renderProducts();
    updateCartTotal();
}

// 4. Отрисовка
function renderProducts() {
    itemList.innerHTML = '';
    products.forEach(product => {
        const count = cart[product.id] || 0;
        const itemDiv = document.createElement('div');
        itemDiv.className = 'item';
        itemDiv.innerHTML = `
            <img src="${product.img}" class="img">
            <p>${product.name}</p>
            <p><b>${product.price} руб.</b></p>
            <div class="stepper">
                <button class="btn-step" onclick="changeCount('${product.id}', -1)">-</button>
                <span class="count-display">${count}</span>
                <button class="btn-step" onclick="changeCount('${product.id}', 1)">+</button>
            </div>`;
        itemList.appendChild(itemDiv);
    });
}

// 5. Итоги и кнопка
function updateCartTotal() {
    let totalPrice = 0;
    let totalCount = 0;

    for (let id in cart) {
        const product = products.find(p => p.id === id);
        if (product) {
            totalPrice += product.price * cart[id];
            totalCount += cart[id];
        }
    }

    finalPriceWithDiscount = totalPrice * 0.9;

    if (totalCount > 0) {
        tg.MainButton.setText(`Оформить заказ: ${finalPriceWithDiscount} руб.`);
        tg.MainButton.show();
    } else {
        tg.MainButton.hide();
    }
}

// 6. Отправка заказа
bot.start((ctx) => {
    ctx.reply('Нажми на кнопку ниже, чтобы открыть магазин. Только так заказ сможет отправиться!', {
        reply_markup: {
            keyboard: [
                [{ 
                    text: "🛒 Открыть магазин", 
                    web_app: { url: 'https://ТВОЯ_ССЫЛКА_НА_САЙТ.com' } 
                }]
            ],
            resize_keyboard: true // Чтобы кнопка не была огромной
        }
    });
});
// Запуск
renderProducts();
updateCartTotal();
</script>
</body>
</html>
