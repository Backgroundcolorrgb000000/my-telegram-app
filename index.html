<!DOCTYPE html>
<html>
<head>
    <title>Furniture Store TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #248bed);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            width: 100%;
        }

        .item {
            width: 42%;
            background-color: var(--sec-bg);
            border-radius: 12px;
            padding: 10px;
            text-align: center;
        }

        .img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        
        #user-name { color: var(--hint); margin-bottom: 20px; text-align: center; }

        .stepper {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-step {
            background-color: var(--btn);
            color: var(--btn-text);
            border: none;
            border-radius: 8px;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .count-display { font-weight: bold; min-width: 15px; }
    </style>
</head>
<body>

    <p id="user-name">Загрузка...</p>
    <div id="item-list" class="container"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    // 1. Данные товаров
    const products = [
        { id: 'sofa', name: 'Диван', price: 25000, img: 'https://via.placeholder.com/150' },
        { id: 'chair', name: 'Кресло', price: 15000, img: 'https://via.placeholder.com/150' },
        { id: 'table', name: 'Стол', price: 10000, img: 'https://via.placeholder.com/150' }
    ];

    let cart = {}; // Храним количество: { sofa: 1, chair: 2 }

    // 2. Отображение приветствия
    const user = tg.initDataUnsafe?.user;
    document.getElementById('user-name').innerText = user ? `Привет, ${user.first_name}!` : "Привет, Гость!";

    // 3. Функция подсчета итога и обновления кнопки Telegram
    function updateCartTotal() {
        let totalPrice = 0;
        let totalCount = 0;

        for (let id in cart) {
            const product = products.find(p => p.id === id);
            if (product && cart[id] > 0) {
                totalPrice += product.price * cart[id];
                totalCount += cart[id];
            }
        }

        if (totalCount > 0) {
            tg.MainButton.setText(`Оформить заказ: ${totalPrice} руб.`);
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
    }

    // 4. Функция отрисовки товаров
    function renderProducts() {
        const itemList = document.getElementById('item-list');
        itemList.innerHTML = '';

        products.forEach(product => {
            const count = cart[product.id] || 0;
            const itemDiv = document.createElement('div');
            itemDiv.className = 'item';
            itemDiv.innerHTML = `
                <img src="${product.img}" class="img">
                <div style="font-size: 14px; margin-bottom: 5px;">${product.name}</div>
                <div style="font-size: 12px; font-weight: bold;">${product.price} ₽</div>
                <div class="stepper">
                    <button class="btn-step" onclick="changeCount('${product.id}', -1)">-</button>
                    <span class="count-display">${count}</span>
                    <button class="btn-step" onclick="changeCount('${product.id}', 1)">+</button>
                </div>
            `;
            itemList.appendChild(itemDiv);
        });
    }

    // 5. Логика изменения количества
    window.changeCount = function(productId, delta) {
        if (!cart[productId]) cart[productId] = 0;
        
        cart[productId] += delta;
        if (cart[productId] < 0) cart[productId] = 0;

        tg.HapticFeedback.impactOccurred('light');
        renderProducts();
        updateCartTotal();
    };

    // 6. Клик по главной кнопке
    tg.MainButton.onClick(() => {
        let summary = "Ваш заказ:\n";
        for (let id in cart) {
            if (cart[id] > 0) {
                const p = products.find(item => item.id === id);
                summary += `- ${p.name}: ${cart[id]} шт.\n`;
            }
        }
        tg.showAlert(summary);
    });

    // Запуск приложения
    renderProducts();
    updateCartTotal();

</script>
</body>
</html>
