<!DOCTYPE html>
<html>
<head>
    <title>My First TMA</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
    body {
        /* Используем системные цвета Telegram */
        background-color: var(--tg-theme-bg-color);
        color: var(--tg-theme-text-color);
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
    }

    button {
        /* Кнопка тоже будет подстраиваться под тему */
        background-color: var(--tg-theme-button-color);
        color: var(--tg-theme-button-text-color);
        border: none;
        border-radius: 8px;
        padding: 10px 20px;
        cursor: pointer;
    }
        .container {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-around;
    padding: 10px;
}

.item {
    width: 45%;
    background-color: var(--tg-theme-secondary-bg-color);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 15px;
    text-align: center;
    color: var(--tg-theme-text-color);
}

.img {
    width: 100%;
    border-radius: 8px;
}

.btn-add {
    background-color: var(--tg-theme-button-color);
    color: var(--tg-theme-button-text-color);
    border: none;
    border-radius: 5px;
    padding: 5px 10px;
    cursor: pointer;
}

        .stepper {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
}

.btn-step {
    background-color: var(--tg-theme-button-color);
    color: var(--tg-theme-button-text-color);
    border: none;
    border-radius: 5px;
    width: 30px;
    height: 30px;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>
<body>
    <div id="item-list" class="container">
    <div class="item">
        <img src="https://via.placeholder.com/150" alt="Диван" class="img">
        <p>Стильный диван</p>
        <p><b>25000 руб.</b></p>
        <button class="btn-add" id="buy-sofa">Выбрать</button>
    </div>
    </div>
    <p id="user-name">Ожидание данных...</p>
    <button id="main-action">Нажми меня!</button>


    <div class="stepper" id="sofa-stepper">
    <button class="btn-step" id="sofa-minus">-</button>
    <span id="sofa-count">0</span>
    <button class="btn-step" id="sofa-plus">+</button>
</div>

<script>
const tg = window.Telegram.WebApp;
const btn = document.getElementById('main-action');
const sofaBtn = document.getElementById('buy-sofa');
const nameElement = document.getElementById('user-name');

tg.expand();
tg.BackButton.hide();

let itemCount = 0;

// 1. Работа с данными пользователя
const user = tg.initDataUnsafe?.user;
if (user && nameElement) {
    nameElement.innerText = `Привет, ${user.first_name}!`;
} else if (nameElement) {
    nameElement.innerText = "Данные не найдены (возможно, вы на ПК)";
}

// 2. Функция обновления Главной кнопки
function updateMainButton() {
    if (itemCount > 0) {
        tg.MainButton.setText(`Перейти в корзину (${itemCount})`);
        tg.MainButton.show();
    } else {
        tg.MainButton.hide();
    }
}

// 3. Обработчик для выбора дивана
if (sofaBtn) {
    sofaBtn.addEventListener('click', () => {
        itemCount++;
        tg.HapticFeedback.impactOccurred('light');
        updateMainButton();
    });
}

// 4. Логика кнопки "Нажми меня" (имитация перехода)
if (btn) {
    btn.addEventListener('click', () => {
        nameElement.innerText = "Вы перешли в каталог мебели! 🛋️";
        tg.BackButton.show();
    });
}

// 5. Логика кнопки "Назад"
tg.BackButton.onClick(() => {
    nameElement.innerText = `Привет, ${user?.first_name || 'гость'}!`;
    tg.BackButton.hide();
});

// 6. Событие смены темы
tg.onEvent('themeChanged', () => {
    tg.showAlert("Цветовая тема изменилась!");
});
</script>
</body>
</html>
